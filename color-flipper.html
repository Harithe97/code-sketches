<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web dev - Color flipper</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            min-height: 100vh;
            
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            align-items: center;
            gap: 16px;

            transition: background-color 0.4s ease, color 0.4s ease;
        }

        #ProjectNav {
            position: absolute;
            top: 24px;
            left: 24px;
        }

        button, #ProjectNav a {
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            padding: 12px 24px;
            border: none;
            border-radius: 50px; 
            background-color: rgba(255, 255, 255, 0.85);
            color: #1a1a1a;
            
            cursor: pointer;
            text-decoration: none;
            display: inline-block; 
            transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        button:hover, #ProjectNav a:hover {
            background-color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            color: #1a1a1a; 
        }

        button:active, #ProjectNav a:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            width: 100%;
            text-align: center;
            margin: 0 0 24px 0;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
        }
    </style>
</head>

<body>
    
    <div id="ProjectNav"> 
        <a href="index.html">Home</a>
    </div>

    <h1>We can flipping teh colors! </h1>
    <button onclick="setColorChaton('PapayaWhip')">Papaya-Whip</button>
    <button onclick="setColorChaton('Peachpuff')">Peach Puff</button>
    <button onclick="setColorChaton('Powderblue')">Powder Blue</button>
    <button onclick="randomColor()"> Random </button>

    <script>
        const body = document.getElementsByTagName("body")[0];

        setColorChaton("grey");
        function setColorChaton(name) {
            body.style.backgroundColor = name;
        }

        function randomColor() {
            console.log("Hi!");
            let R = Math.round(Math.random() * 255);
            let G = Math.round(Math.random() * 255);
            let B = Math.round(Math.random() * 255);

            let theColor = `rgb( ${R} , ${G} , ${B} )`;
            body.style.backgroundColor = theColor;

            if (R + G + B < 350) {
                body.style.color = "white";
            }
            else {
                body.style.color = "black";
            }
        }
    </script>
</body>
</html>
