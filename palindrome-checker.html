	<script>
		console.clear();

		theFeedback.innerHTML = "bla bla bla chaton";

		 const theButton = document.getElementById("theButton")
		 theButton.addEventListener("click", checkTheText); 

		function  checkTheText(){
			console.log("we are checking the texts");

			const theInupt = document.getElementById("InputString");
			console.log(theInupt.value);

			if( theInupt.value == "chaton"){

				console.log("no");

			theInupt.value ==""; // Vider apres usage

		}// Check the text

		function checkPalindrome(str){
			//console.log("Palindrome Check: " + str);

		str = str.replaceAll(" ","");	

		let theLetters = str.split("")
		let verlan = theLetters.reverse();
		let rts = verlan.join("");

		console.log("rts = " + rts);

		if ( str == rts){
			return true;
		}
		else {
			return false;
		}

		}
